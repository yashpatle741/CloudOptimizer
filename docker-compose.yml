services:
  backend:
    build: ./backend
    container_name: cloudoptimizer-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cloudoptimizer-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped